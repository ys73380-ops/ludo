<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ludo WebApp</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.game-container{
text-align:center;
}

canvas{
background:white;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.4);
max-width:95vw;
max-height:95vw;
}

#status{
margin-top:15px;
color:white;
font-size:18px;
font-weight:bold;
}

.selected{
outline:4px solid gold;
}
</style>
</head>

<body>

<div class="game-container">
<canvas id="board" width="750" height="750"></canvas>
<div id="status">Ludo WebApp Ready</div>
</div>

<script>

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const CELL = 50;

function drawBoard(){

ctx.clearRect(0,0,750,750);

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,750,750);

drawHome(0,0,"#ff2d2d");
drawHome(450,0,"#16a34a");
drawHome(0,450,"#2563eb");
drawHome(450,450,"#facc15");

drawCenter();

drawGrid();
drawTokens();
}

function drawHome(x,y,color){

ctx.fillStyle=color;
ctx.fillRect(x,y,300,300);

ctx.fillStyle="white";
ctx.fillRect(x+50,y+50,200,200);

let pos=[
[x+85,y+85],
[x+185,y+85],
[x+85,y+185],
[x+185,y+185]
];

pos.forEach(p=>{
ctx.beginPath();
ctx.arc(p[0],p[1],18,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();
ctx.stroke();
});
}

function drawCenter(){

ctx.beginPath();

ctx.fillStyle="red";
ctx.moveTo(375,375);
ctx.lineTo(300,300);
ctx.lineTo(450,300);
ctx.fill();

ctx.beginPath();
ctx.fillStyle="green";
ctx.moveTo(375,375);
ctx.lineTo(450,300);
ctx.lineTo(450,450);
ctx.fill();

ctx.beginPath();
ctx.fillStyle="yellow";
ctx.moveTo(375,375);
ctx.lineTo(450,450);
ctx.lineTo(300,450);
ctx.fill();

ctx.beginPath();
ctx.fillStyle="blue";
ctx.moveTo(375,375);
ctx.lineTo(300,450);
ctx.lineTo(300,300);
ctx.fill();
}

function drawGrid(){

ctx.strokeStyle="#444";

for(let i=0;i<=15;i++){

ctx.beginPath();
ctx.moveTo(i*50,0);
ctx.lineTo(i*50,750);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,i*50);
ctx.lineTo(750,i*50);
ctx.stroke();
}
}

const tokens=[
{x:85,y:85,color:"red"},
{x:535,y:85,color:"green"},
{x:85,y:535,color:"blue"},
{x:535,y:535,color:"yellow"}
];

let selected=-1;

function drawTokens(){

tokens.forEach((t,index)=>{

ctx.beginPath();
ctx.arc(t.x,t.y,20,0,Math.PI*2);
ctx.fillStyle=t.color;
ctx.fill();
ctx.strokeStyle=index===selected?"gold":"black";
ctx.lineWidth=index===selected?5:2;
ctx.stroke();

});
}

canvas.addEventListener("click",(e)=>{

const rect=canvas.getBoundingClientRect();

const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;

tokens.forEach((t,index)=>{

const d=Math.hypot(mx-t.x,my-t.y);

if(d<25){
selected=index;
animateToken(index);
}
});

});

function animateToken(i){

let step=0;

const interval=setInterval(()=>{

tokens[i].x+=2;

drawBoard();

step++;

if(step>=25){
clearInterval(interval);
winnerCheck();
}

},16);

}

function winnerCheck(){

if(tokens[0].x>650){

document.getElementById("status").innerHTML=
"🏆 WINNER!";

}
}

drawBoard();

</script>

</body>
</html>
