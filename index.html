<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎲 Ludo Word Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0d0d1a;
  --surface: #13132a;
  --card:    #1a1a3e;
  --red:     #ff4757;
  --yellow:  #ffa502;
  --green:   #2ed573;
  --blue:    #1e90ff;
  --text:    #f1f2f6;
  --muted:   #747d8c;
  --border:  rgba(255,255,255,0.07);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding: 14px;
  max-width: 430px;
  margin: 0 auto;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.header h1 { font-size: 17px; font-weight: 800; }

.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border-radius: 99px;
  padding: 4px 11px;
  font-size: 11px;
  color: var(--muted);
}
.dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
.dot.live  { background:var(--green); box-shadow:0 0 7px var(--green); animation:blink 2s infinite; }
.dot.error { background:var(--red); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Turn Banner ── */
.turn-banner {
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 14px;
  text-align: center;
  border: 1.5px solid var(--border);
  transition: background .4s, border-color .4s;
}
.turn-banner .who  { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; opacity:.6; margin-bottom:3px; }
.turn-banner .name { font-size:24px; font-weight:800; }

/* ── Dice ── */
.dice-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-bottom: 14px;
}

.dice {
  width: 86px; height: 86px;
  background: white;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  box-shadow: 0 8px 40px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.3);
  transition: transform .2s;
  user-select: none;
}

.dice.rolling { animation: roll .65s cubic-bezier(.36,.07,.19,.97); }

@keyframes roll {
  0%   { transform: rotate(0)     scale(1);   }
  20%  { transform: rotate(72deg) scale(.7);  }
  40%  { transform: rotate(144deg)scale(1.2); }
  60%  { transform: rotate(216deg)scale(.8);  }
  80%  { transform: rotate(288deg)scale(1.1); }
  100% { transform: rotate(360deg)scale(1);   }
}

.dice-info .roll-num   { font-size:42px; font-weight:900; line-height:1; }
.dice-info .roll-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

/* ── Word Result ── */
.word-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.word-text { font-size:20px; font-weight:700; text-align:center; margin-bottom:10px; }
.bar-track { height:8px; background:rgba(255,255,255,.09); border-radius:99px; overflow:hidden; margin-bottom:7px; }
.bar-fill  { height:100%; border-radius:99px; width:0%; transition: width 1.3s cubic-bezier(.16,1,.3,1); }
.qual-row  { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }

/* ── Players Grid ── */
.sec-title { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:9px; }

.players-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }

.player-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  transition: all .35s ease;
}
.player-card.active {
  background: var(--card);
  border-color: var(--accent, #667eea);
  transform: scale(1.04);
  box-shadow: 0 0 22px -4px var(--accent, #667eea);
}

.p-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.p-name { font-size:14px; font-weight:600; max-width:88px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.p-pts  { font-size:11px; color:var(--muted); }

.pieces-row { display:flex; gap:5px; flex-wrap:wrap; }

.piece {
  width:27px; height:27px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700;
  color:white;
  border: 2px solid rgba(255,255,255,.25);
  transition: all .5s cubic-bezier(.34,1.56,.64,1);
}
.piece.yard { opacity:.32; }
.piece.home { border-color:gold; box-shadow:0 0 10px gold; }

.piece.bounce { animation: pcbounce .55s cubic-bezier(.34,1.56,.64,1); }
@keyframes pcbounce {
  0%  { transform: scale(1)   translateY(0); }
  30% { transform: scale(1.5) translateY(-16px); }
  65% { transform: scale(.9)  translateY(-5px); }
  85% { transform: scale(1.1) translateY(-2px); }
  100%{ transform: scale(1)   translateY(0); }
}

.piece.shake { animation: shake .45s ease; }
@keyframes shake {
  0%,100%{ transform:translateX(0); }
  20%{ transform:translateX(-7px) rotate(-3deg); }
  40%{ transform:translateX(7px) rotate(3deg); }
  60%{ transform:translateX(-5px); }
  80%{ transform:translateX(5px); }
}

/* ── No-game screen ── */
.center {
  text-align:center;
  padding: 60px 20px;
}
.center .icon { font-size:56px; margin-bottom:14px; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.center h2 { font-size:18px; margin-bottom:8px; }
.center p  { color:var(--muted); font-size:13px; }

/* ── Winner Banner ── */
.winner-card {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  margin-bottom: 14px;
  animation: winPop .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes winPop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.winner-card .trophy { font-size:52px; margin-bottom:8px; }
.winner-card h2 { font-size:22px; font-weight:800; }
.winner-card p  { font-size:13px; opacity:.8; margin-top:4px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎲 Ludo Word Bot</h1>
  <div class="pill">
    <span class="dot" id="dot"></span>
    <span id="statusTxt">Connecting</span>
  </div>
</div>

<div id="root">
  <div class="center">
    <div class="icon">🎮</div>
    <h2>Loading…</h2>
    <p>Please wait</p>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ⚙️  FILL THESE IN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SUPABASE_URL      = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const CHAT_ID = parseInt(new URLSearchParams(location.search).get("chat_id") || "0");

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const DICE  = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
const CEMOJI= {RED:"🔴", YELLOW:"🟡", GREEN:"🟢", BLUE:"🔵"};
const CHEX  = {RED:"#ff4757", YELLOW:"#ffa502", GREEN:"#2ed573", BLUE:"#1e90ff"};
const HOME=57, YARD=0;

let prevEvTs = null;

// ─────────────────────────────────────
function setStatus(s) {
  const dot = document.getElementById("dot");
  const txt = document.getElementById("statusTxt");
  if (s==="live")  { dot.className="dot live";  txt.textContent="Live"; }
  else if(s==="error"){ dot.className="dot error"; txt.textContent="Disconnected"; }
  else              { dot.className="dot";       txt.textContent="Connecting"; }
}

// ─────────────────────────────────────
function render(state, ev) {
  const root = document.getElementById("root");
  if (!state) return;

  // ── No game ──
  if (!state.game_active && !ev?.winner) {
    root.innerHTML = `<div class="center"><div class="icon">🎮</div><h2>No active game</h2><p>Use /2player or /4player in the group</p></div>`;
    return;
  }

  // ── Winner screen ──
  if (ev?.winner) {
    const wCol  = state.player_colour?.[String(ev.winner_uid)] || "BLUE";
    const wHex  = CHEX[wCol];
    root.innerHTML = `
      <div class="winner-card">
        <div class="trophy">🏆</div>
        <h2>${CEMOJI[wCol]} ${ev.winner} WON!</h2>
        <p>Congratulations!</p>
      </div>
      <div class="center"><p style="color:var(--muted)">Use /2player or /4player to play again</p></div>`;
    return;
  }

  const curUid  = String(state.current_turn_uid);
  const curName = state.player_names?.[curUid] || "?";
  const curCol  = state.player_colour?.[curUid] || "BLUE";
  const curHex  = CHEX[curCol];

  const newEv  = ev && ev.ts && ev.ts !== prevEvTs;
  const roll   = newEv ? ev.roll : null;

  // ── Turn Banner ──
  const bannerHTML = `
    <div class="turn-banner" style="background:${curHex}1a; border-color:${curHex}55">
      <div class="who">Current Turn</div>
      <div class="name">${CEMOJI[curCol]} ${curName}</div>
    </div>`;

  // ── Dice ──
  const diceFace  = roll ? DICE[roll] : "🎲";
  const rollClass = roll ? "rolling" : "";
  const diceHTML  = `
    <div class="dice-wrap">
      <div class="dice ${rollClass}" id="dice">${diceFace}</div>
      ${roll ? `
      <div class="dice-info">
        <div class="roll-num" style="color:${curHex}">${roll}</div>
        <div class="roll-label">Dice Roll</div>
      </div>` : `<div class="dice-info"><div class="roll-label" style="margin-top:8px">Type a word<br>in group chat 💬</div></div>`}
    </div>`;

  // ── Word Card ──
  let wordHTML = "";
  if (newEv && ev.word) {
    const pct   = Math.round((roll / 6) * 100);
    const barcol= roll>=5?"#ffd700":roll>=4?"#ff6b6b":roll>=3?"#51cf66":roll>=2?"#74c0fc":"#868e96";
    const qual  = roll>=5?"💎 Exceptional":roll>=4?"🔥 Impressive":roll>=3?"👍 Good":roll>=2?"😐 Common":"😴 Very common";
    wordHTML = `
      <div class="word-card">
        <div class="word-text">"${ev.word}"</div>
        <div class="bar-track"><div class="bar-fill" id="bar" style="background:${barcol}"></div></div>
        <div class="qual-row"><span>${qual}</span><span style="color:${barcol}">${ev.actor || ""}</span></div>
      </div>`;
  }

  // ── Players ──
  let pgHTML = `<div class="sec-title">Players</div><div class="players-grid">`;
  for (const uid of (state.players || [])) {
    const su   = String(uid);
    const name = state.player_names?.[su] || "?";
    const col  = state.player_colour?.[su] || "BLUE";
    const hex  = CHEX[col];
    const pts  = state.player_scores?.[su] || 0;
    const pcs  = state.pieces?.[su] || [0,0,0,0];
    const act  = su === curUid;

    let pcsHTML = '<div class="pieces-row">';
    for (let i=0;i<pcs.length;i++) {
      const p   = pcs[i];
      const cls = p===YARD?"yard":p===HOME?"home":"";
      const lbl = p===YARD?"Y":p===HOME?"★":p;
      pcsHTML  += `<div class="piece ${cls}" id="pc-${su}-${i}" style="background:${hex}">${lbl}</div>`;
    }
    pcsHTML += '</div>';

    pgHTML += `
      <div class="player-card ${act?"active":""}" style="--accent:${hex}">
        <div class="p-top">
          <div class="p-name">${CEMOJI[col]} ${name}</div>
          <div class="p-pts">${pts}pt</div>
        </div>
        ${pcsHTML}
      </div>`;
  }
  pgHTML += '</div>';

  root.innerHTML = bannerHTML + diceHTML + wordHTML + pgHTML;

  // Animate bar
  if (newEv && ev.word) {
    const bar = document.getElementById("bar");
    const pct = Math.round((roll / 6) * 100);
    if (bar) requestAnimationFrame(() => requestAnimationFrame(() => bar.style.width = pct + "%"));
  }

  // Piece bounce
  if (newEv && ev.moved_uid != null) {
    const el = document.getElementById(`pc-${ev.moved_uid}-${ev.piece_idx}`);
    if (el) { el.classList.add("bounce"); setTimeout(()=>el.classList.remove("bounce"), 650); }
  }

  // Capture shake
  if (newEv && ev.captured_uid != null) {
    for (let i=0;i<4;i++) {
      const el = document.getElementById(`pc-${ev.captured_uid}-${i}`);
      if (el) { el.classList.add("shake"); setTimeout(()=>el.classList.remove("shake"), 550); }
    }
  }

  if (newEv) prevEvTs = ev.ts;
}

// ─────────────────────────────────────
async function init() {
  if (!CHAT_ID) {
    document.getElementById("root").innerHTML =
      `<div class="center"><div class="icon">⚠️</div><h2>Missing chat_id</h2><p>Open this link from the bot in your group</p></div>`;
    return;
  }

  // Initial fetch
  const { data } = await sb
    .from("ludo_game_states")
    .select("*")
    .eq("chat_id", CHAT_ID)
    .maybeSingle();

  if (data) render(data.state, data.last_event);
  else document.getElementById("root").innerHTML =
    `<div class="center"><div class="icon">🎲</div><h2>No game yet</h2><p>Start with /2player or /4player</p></div>`;

  // Realtime subscription
  sb.channel(`game_${CHAT_ID}`)
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "ludo_game_states",
      filter: `chat_id=eq.${CHAT_ID}`
    }, ({ new: row }) => render(row.state, row.last_event))
    .subscribe(status => {
      if (status === "SUBSCRIBED") setStatus("live");
      else if (["CHANNEL_ERROR","TIMED_OUT"].includes(status)) setStatus("error");
    });
}

init();
</script>
</body>
</html>
