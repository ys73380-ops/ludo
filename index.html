<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Ludo Companion</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #121824, #1a2333);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* ----- GAME HEADER & STATUS ----- */
        #game-header {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        #turn-indicator {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #dice-status {
            font-size: 0.9rem;
            color: #a0aec0;
        }

        /* ----- LUDO BOARD CONTAINER ----- */
        #board-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1; /* Board remains perfect square */
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 4px solid #1a2333;
        }

        #ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%;
            height: 100%;
        }

        /* ----- BOARD CELL STYLING ----- */
        .cell {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        /* Ludo Colors */
        .red-bg { background-color: #f56565 !important; }
        .green-bg { background-color: #48bb78 !important; }
        .yellow-bg { background-color: #ecc94b !important; }
        .blue-bg { background-color: #4299e1 !important; }

        /* Home Stretch & Starts */
        .red-start { background-color: #fc8181 !important; border-radius: 5px; }
        .green-start { background-color: #68d391 !important; border-radius: 5px; }
        .blue-start { background-color: #63b3ed !important; border-radius: 5px; }
        .yellow-start { background-color: #f6e05e !important; border-radius: 5px; }

        /* Star Safe Spots */
        .safe-spot::before {
            content: "★";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #718096;
            font-size: 1.2rem;
        }

        /* Center Triangle */
        .center-core { background: #2d3748 !important; }
        .red-home-stretch { background: #feb2b2 !important; }
        .green-home-stretch { background: #9ae6b4 !important; }
        .blue-home-stretch { background: #90cdf4 !important; }
        .yellow-home-stretch { background: #faf089 !important; }

        /* ----- TOKENS / GOTIS (IMPROVED SIZE & HITBOX) ----- */
        .token-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass to tokens */
        }

        .token {
            pointer-events: auto; /* Enable touch/click only on tokens */
            width: 8%; /* Bigger responsive size relative to board */
            aspect-ratio: 1;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            border: 2px solid #ffffff;
        }

        /* INVISIBLE HITBOX (Fat-Finger Fix): 
           भले ही गोटी छोटी दिखे, छूने का एरिया बहुत बड़ा (50px से ज़्यादा) होगा! */
        .token::after {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
        }

        /* Token Colors */
        .token-red { background: radial-gradient(circle at 35% 35%, #fc8181, #c53030); }
        .token-green { background: radial-gradient(circle at 35% 35%, #68d391, #22543d); }
        .token-yellow { background: radial-gradient(circle at 35% 35%, #f6e05e, #b7791f); }
        .token-blue { background: radial-gradient(circle at 35% 35%, #63b3ed, #2b6cb0); }

        /* Inner Ring to look premium */
        .token-inner {
            width: 45%;
            height: 45%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Pulse Highlight for movable tokens */
        .token.movable {
            animation: pulseHighlight 1.2s infinite;
            border: 3px solid #ffffff;
            z-index: 20;
            scale: 1.15;
        }

        @keyframes pulseHighlight {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.8), 0 4px 8px rgba(0,0,0,0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 255, 255, 0), 0 4px 8px rgba(0,0,0,0.4);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0), 0 4px 8px rgba(0,0,0,0.4);
            }
        }

        /* ----- NOTIFICATION TOASTS ----- */
        #toast {
            position: fixed;
            bottom: 30px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Game Header -->
        <div id="game-header">
            <div id="turn-indicator">Loading game session...</div>
            <div id="dice-status">Waiting for network sync</div>
        </div>

        <!-- Ludo Board Wrapper -->
        <div id="board-wrapper">
            <div id="ludo-board"></div>
            <!-- Dynamic Token Layer -->
            <div id="token-layer" class="token-layer"></div>
        </div>
    </div>

    <!-- Toast Alerts -->
    <div id="toast">Message</div>

    <script>
        // ----- PARSE URL PARAMS -----
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = parseInt(urlParams.get('chat_id')) || 0;
        const userId = parseInt(urlParams.get('user_id')) || 0;
        const apiToken = urlParams.get('token') || "super_secret_ludo_token_123";
        
        // Automatically determine backend base address or fallback to current origin
        const apiBase = urlParams.get('api') || window.location.origin;

        let gameState = null;
        let lastUpdated = 0;

        // ----- COORDINATES MAP (15x15 CSS Grid to visual absolute position %) -----
        // Grid contains 15 columns (0 to 14) and 15 rows (0 to 14).
        // Each grid step is (100 / 15) = 6.666% wide and tall.
        function getPercentPos(r, c) {
            return {
                x: (c * 6.666) + 3.333,
                y: (r * 6.666) + 3.333
            };
        }

        // Common 52 track spaces mapped to row (r) and col (c)
        const trackCoords = [
            {r:6, c:1}, {r:6, c:2}, {r:6, c:3}, {r:6, c:4}, {r:6, c:5},
            {r:5, c:6}, {r:4, c:6}, {r:3, c:6}, {r:2, c:6}, {r:1, c:6}, {r:0, c:6},
            {r:0, c:7},
            {r:0, c:8}, {r:1, c:8}, {r:2, c:8}, {r:3, c:8}, {r:4, c:8}, {r:5, c:8},
            {r:6, c:9}, {r:6, c:10}, {r:6, c:11}, {r:6, c:12}, {r:6, c:13}, {r:6, c:14},
            {r:7, c:14},
            {r:8, c:14}, {r:8, c:13}, {r:8, c:12}, {r:8, c:11}, {r:8, c:10}, {r:8, c:9},
            {r:9, c:8}, {r:10, c:8}, {r:11, c:8}, {r:12, c:8}, {r:13, c:8}, {r:14, c:8},
            {r:14, c:7},
            {r:14, c:6}, {r:13, c:6}, {r:12, c:6}, {r:11, c:6}, {r:10, c:6}, {r:9, c:6},
            {r:8, c:5}, {r:8, c:4}, {r:8, c:3}, {r:8, c:2}, {r:8, c:1}, {r:8, c:0},
            {r:7, c:0},
            {r:6, c:0}
        ];

        // Yard / Home base position coordinates for each of the 4 colors (Red, Green, Yellow, Blue)
        const baseCoords = {
            "🔴 Red":    [{r:2, c:2}, {r:2, c:3}, {r:3, c:2}, {r:3, c:3}],
            "🟢 Green":  [{r:2, c:11}, {r:2, c:12}, {r:3, c:11}, {r:3, c:12}],
            "🔵 Blue":   [{r:11, c:11}, {r:11, c:12}, {r:12, c:11}, {r:12, c:12}],
            "🟡 Yellow": [{r:11, c:2}, {r:11, c:3}, {r:12, c:2}, {r:12, c:3}]
        };

        // Home stretches (positions 53-58) and final home (59)
        function getSpecialPos(color, pos) {
            if (pos === 59) return {r:7, c:7}; // Center
            
            if (color === "🔴 Red") {
                return {r:7, c: pos - 52};
            } else if (color === "🟢 Green") {
                return {r: pos - 52, c:7};
            } else if (color === "🔵 Blue") {
                return {r:7, c: 14 - (pos - 52)};
            } else if (color === "🟡 Yellow") {
                return {r: 14 - (pos - 52), c:7};
            }
            return {r:7, c:7};
        }

        // Resolve absolute position on the board
        function resolvePosition(color, tokenIdx, pos) {
            let cell = {r:0, c:0};
            if (pos === 0) {
                cell = baseCoords[color][tokenIdx];
            } else if (pos >= 53) {
                cell = getSpecialPos(color, pos);
            } else {
                // Adjust common track positions based on Ludo index offsets
                let trackIdx = (pos - 1) % 52;
                cell = trackCoords[trackIdx];
            }
            return getPercentPos(cell.r, cell.c);
        }

        // ----- RENDER STATIC CSS GRID BOARD -----
        function createBoard() {
            const board = document.getElementById('ludo-board');
            board.innerHTML = '';
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // Colors rendering logic
                    if (r < 6 && c < 6) cell.classList.add('red-bg');
                    else if (r < 6 && c > 8) cell.classList.add('green-bg');
                    else if (r > 8 && c < 6) cell.classList.add('yellow-bg');
                    else if (r > 8 && c > 8) cell.classList.add('blue-bg');
                    
                    // Home paths
                    else if (r === 7 && c > 0 && c < 7) cell.classList.add('red-bg');
                    else if (r === 7 && c > 7 && c < 14) cell.classList.add('blue-bg');
                    else if (c === 7 && r > 0 && r < 7) cell.classList.add('green-bg');
                    else if (c === 7 && r > 7 && r < 14) cell.classList.add('yellow-bg');
                    
                    // Start arrows
                    else if (r === 6 && c === 1) cell.classList.add('red-start');
                    else if (r === 1 && c === 8) cell.classList.add('green-start');
                    else if (r === 8 && c === 13) cell.classList.add('blue-start');
                    else if (r === 13 && c === 6) cell.classList.add('yellow-start');
                    
                    // Center Home Triangle quarters
                    else if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
                        if (r === 7 && c === 7) cell.classList.add('center-core');
                        else if (r < 7) cell.classList.add('green-home-stretch');
                        else if (r > 7) cell.classList.add('yellow-home-stretch');
                        else if (c < 7) cell.classList.add('red-home-stretch');
                        else if (c > 7) cell.classList.add('blue-home-stretch');
                    }
                    
                    // Safe zone stars
                    if ((r === 6 && c === 1) || (r === 8 && c === 1) || (r === 8 && c === 13) || (r === 6 && c === 13) ||
                        (r === 1 && c === 6) || (r === 1 && c === 8) || (r === 13 && c === 6) || (r === 13 && c === 8) ||
                        (r === 8 && c === 2) || (r === 2 && c === 6) || (r === 6 && c === 12) || (r === 12 && c === 8)) {
                        cell.classList.add('safe-spot');
                    }
                    
                    board.appendChild(cell);
                }
            }
        }

        // ----- UPDATE GAME ENGINE DISPLAY -----
        function updateUI() {
            if (!gameState) return;

            // Turn info
            const currentTurnIdx = gameState.turn_index;
            const currentPlayer = gameState.players[currentTurnIdx];
            const turnIndicator = document.getElementById('turn-indicator');
            const diceStatus = document.getElementById('dice-status');

            if (gameState.winner !== -1) {
                const winnerName = gameState.players[gameState.winner].username;
                turn_indicator.innerHTML = `🏆 Winner: ${winnerName}!`;
                diceStatus.innerHTML = `The game has finished.`;
                return;
            }

            turnIndicator.innerHTML = `👉 Turn: <span style="color: ${getColorHex(currentPlayer.color)}">${currentPlayer.username}</span>`;
            
            if (gameState.rolled) {
                diceStatus.innerHTML = `🎲 Dice Rolled = <b>${gameState.dice_value}</b> | Please tap a movable token!`;
            } else {
                diceStatus.innerHTML = `⏳ Awaiting word submission/roll in Telegram chat.`;
            }

            // Draw players' tokens
            const layer = document.getElementById('token-layer');
            layer.innerHTML = '';

            // Map and identify overlapping tokens to apply jitter offset
            const positionTracker = {};

            gameState.players.forEach((player, pidx) => {
                const colorCode = player.color.split(' ')[1].toLowerCase(); // "red", "green" etc.
                
                player.tokens.forEach((pos, tidx) => {
                    const absPos = resolvePosition(player.color, tidx, pos);
                    
                    // Overlap tracker key
                    const key = `${Math.round(absPos.x)}_${Math.round(absPos.y)}`;
                    if (!positionTracker[key]) {
                        positionTracker[key] = [];
                    }
                    positionTracker[key].push({ pidx, tidx, colorCode, player, pos });
                });
            });

            // Loop and render tokens with subtle coordinate offsets if they sit on the same space
            Object.keys(positionTracker).forEach(key => {
                const stacked = positionTracker[key];
                stacked.forEach((info, index) => {
                    const token = document.createElement('div');
                    token.className = `token token-${info.colorCode}`;
                    
                    // Add modern premium inner ring
                    const innerRing = document.createElement('div');
                    innerRing.className = 'token-inner';
                    token.appendChild(innerRing);

                    // Overlap Jitter (offset) logic so stacked tokens remain individually touchable
                    let offsetPercentX = 0;
                    let offsetPercentY = 0;
                    if (stacked.length > 1) {
                        offsetPercentX = (index * 2) - (stacked.length - 1);
                        offsetPercentY = (index * -2) + (stacked.length - 1);
                    }

                    const originalCoords = resolvePosition(info.player.color, info.tidx, info.pos);
                    token.style.left = `${originalCoords.x + offsetPercentX}%`;
                    token.style.top = `${originalCoords.y + offsetPercentY}%`;

                    // Check if current token belongs to the player whose turn it is, and if they can move
                    const isMyTurn = (gameState.turn_index === info.pidx) && (info.player.id === userId);
                    const canMoveThisToken = isMyTurn && gameState.rolled && canMoveRule(info.pos, gameState.dice_value);

                    if (canMoveThisToken) {
                        token.classList.add('movable');
                        
                        // Optimized instantaneous touch interaction (PointerDown)
                        token.addEventListener('pointerdown', (e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            performMove(info.tidx);
                        });
                    }

                    layer.appendChild(token);
                });
            });
        }

        // Safe helper for matching color strings to solid CSS hex codes
        function getColorHex(colorStr) {
            if (colorStr.includes("Red")) return "#f56565";
            if (colorStr.includes("Green")) return "#48bb78";
            if (colorStr.includes("Blue")) return "#4299e1";
            if (colorStr.includes("Yellow")) return "#ecc94b";
            return "#ffffff";
        }

        // Local client check if token path move is valid
        function canMoveRule(pos, dice) {
            if (pos >= 59) return false;
            if (pos === 0) return true;
            let newPos = pos + dice;
            if (1 <= pos && pos <= 52 && newPos > 52) {
                newPos = 52 + (newPos - 52);
            }
            if (newPos > 58) newPos = 59;
            return newPos !== pos;
        }

        // ----- API INTERACTION -----
        async function fetchGameState() {
            try {
                const response = await fetch(`${apiBase}/game_state?chat_id=${chatId}&token=${apiToken}`);
                if (response.ok) {
                    gameState = await response.json();
                    updateUI();
                } else {
                    const errData = await response.json();
                    logger("Error", errData.error);
                }
            } catch (err) {
                console.error("Network error during fetchGameState:", err);
            }
        }

        async function performMove(tokenIdx) {
            showToast("Processing token movement...");
            try {
                const response = await fetch(`${apiBase}/move?chat_id=${chatId}&user_id=${userId}&token_idx=${tokenIdx}&token=${apiToken}`, {
                    method: 'POST'
                });
                const resData = await response.json();
                
                if (response.ok) {
                    showToast("Move executed successfully!");
                    // Refresh data immediately
                    fetchGameState();
                } else {
                    showToast(`⚠️ ${resData.error || "Movement rejected"}`);
                }
            } catch (err) {
                showToast("⚠️ Network issue executing turn.");
                console.error("Network error during performMove:", err);
            }
        }

        // ----- UTILITY TOAST NOTIFICATIONS -----
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // ----- INITIALIZE BOOTSTRAP -----
        createBoard();
        fetchGameState();

        // Safe polling every 2.0 seconds to keep board synchronised with telegram backend activity
        setInterval(fetchGameState, 2000);
    </script>
</body>
</html>
