<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ludo WebApp</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#111827;display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;}
.game-container{text-align:center;padding:10px;}
canvas{background:white;border-radius:20px;box-shadow:0 0 25px rgba(0,0,0,.4);max-width:95vw;max-height:95vw;}
#status{margin-top:15px;color:white;font-size:16px;font-weight:bold;padding:0 10px;}
#error-box{
  display:none;
  background:#ef4444;
  color:white;
  padding:12px 20px;
  border-radius:10px;
  margin:15px;
  font-size:14px;
  text-align:center;
}
#loading{
  color:#60a5fa;
  font-size:16px;
  margin-top:20px;
}
</style>
</head>
<body>
<div id="loading">⏳ Loading game...</div>
<div id="error-box"></div>
<div class="game-container" id="game-wrap" style="display:none;">
  <canvas id="board" width="750" height="750"></canvas>
  <div id="status">🎲 Ludo WebApp Ready</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg) tg.ready();

function getParam(name){
  const url = new URLSearchParams(window.location.search);
  const startParam = tg?.initDataUnsafe?.start_param || "";
  if(name === "chat_id" && !url.get("chat_id") && startParam){
    const match = startParam.match(/chatid_(-?\d+)/);
    if(match) return match[1];
    if(/^-?\d+$/.test(startParam)) return startParam;
  }
  return url.get(name);
}

const CHAT_ID = getParam("chat_id");
const BOT_API = getParam("api") || "";

function showError(msg){
  document.getElementById("loading").style.display = "none";
  const box = document.getElementById("error-box");
  box.style.display = "block";
  box.innerHTML = "⚠️ " + msg;
}

function startGame(){
  document.getElementById("loading").style.display = "none";
  document.getElementById("game-wrap").style.display = "block";
  drawBoard();
}

if(!CHAT_ID){
  showError("Group ID not found. Please start the game from the group chat using the bot.");
} else {
  if(BOT_API){
    fetch(`${BOT_API}/game_state?chat_id=${CHAT_ID}`)
      .then(r => r.json())
      .then(data => {
        if(data.tokens) loadTokensFromServer(data.tokens);
        startGame();
      })
      .catch(() => {
        startGame();
        document.getElementById("status").innerHTML = "⚠️ Offline mode — bot not reachable";
      });
  } else {
    startGame();
  }
}

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const tokens = [
  {x:85,  y:85,  color:"red"},
  {x:535, y:85,  color:"green"},
  {x:85,  y:535, color:"blue"},
  {x:535, y:535, color:"yellow"}
];
let selected = -1;

function loadTokensFromServer(serverTokens){
  serverTokens.forEach((t,i)=>{ if(tokens[i]) Object.assign(tokens[i], t); });
}

function drawBoard(){
  ctx.clearRect(0,0,750,750);
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,750,750);
  drawHome(0,0,"#ff2d2d");
  drawHome(450,0,"#16a34a");
  drawHome(0,450,"#2563eb");
  drawHome(450,450,"#facc15");
  drawCenter();
  drawGrid();
  drawTokens();
}

function drawHome(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x,y,300,300);
  ctx.fillStyle="white";
  ctx.fillRect(x+50,y+50,200,200);
  [[x+85,y+85],[x+185,y+85],[x+85,y+185],[x+185,y+185]].forEach(p=>{
    ctx.beginPath();
    ctx.arc(p[0],p[1],18,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
    ctx.strokeStyle="#333";
    ctx.lineWidth=1;
    ctx.stroke();
  });
}

function drawCenter(){
  [
    {color:"red",   pts:[[375,375],[300,300],[450,300]]},
    {color:"green", pts:[[375,375],[450,300],[450,450]]},
    {color:"yellow",pts:[[375,375],[450,450],[300,450]]},
    {color:"blue",  pts:[[375,375],[300,450],[300,300]]},
  ].forEach(({color,pts})=>{
    ctx.beginPath();
    ctx.fillStyle=color;
    ctx.moveTo(...pts[0]);
    ctx.lineTo(...pts[1]);
    ctx.lineTo(...pts[2]);
    ctx.fill();
  });
}

function drawGrid(){
  ctx.strokeStyle="#ccc";
  ctx.lineWidth=0.5;
  for(let i=0;i<=15;i++){
    ctx.beginPath(); ctx.moveTo(i*50,0); ctx.lineTo(i*50,750); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*50); ctx.lineTo(750,i*50); ctx.stroke();
  }
}

function drawTokens(){
  tokens.forEach((t,index)=>{
    ctx.beginPath();
    ctx.arc(t.x,t.y,20,0,Math.PI*2);
    ctx.fillStyle=t.color;
    ctx.fill();
    ctx.strokeStyle=index===selected?"gold":"black";
    ctx.lineWidth=index===selected?5:2;
    ctx.stroke();
  });
}

canvas.addEventListener("click",(e)=>{
  const rect=canvas.getBoundingClientRect();
  const scale=750/rect.width;
  const mx=(e.clientX-rect.left)*scale;
  const my=(e.clientY-rect.top)*scale;
  tokens.forEach((t,index)=>{
    if(Math.hypot(mx-t.x,my-t.y)<25){
      selected=index;
      animateToken(index);
    }
  });
});

function animateToken(i){
  let step=0;
  const interval=setInterval(()=>{
    tokens[i].x+=2;
    drawBoard();
    step++;
    if(step>=25){ clearInterval(interval); winnerCheck(); }
  },16);
}

function winnerCheck(){
  if(tokens[0].x>650){
    document.getElementById("status").innerHTML="🏆 WINNER!";
  }
}
</script>
</body>
</html>
