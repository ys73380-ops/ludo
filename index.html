<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Companion</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1f2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px;
            gap: 12px;
        }

        /* ---- HEADER ---- */
        #header {
            width: 100%;
            max-width: 480px;
            background: #252c3e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #turn-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #turn-indicator {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        #dice-badge {
            background: #1a1f2e;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #dice-status {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.2px;
        }

        /* ---- BOARD WRAPPER ---- */
        #board-wrapper {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0,0,0,0.6);
            border: 3px solid #2d3548;
        }

        /* ---- CSS GRID BOARD ---- */
        #ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%;
            height: 100%;
            background: #f8f5f0;
        }

        .cell {
            border: 0.5px solid rgba(0,0,0,0.12);
            position: relative;
            background: #f8f5f0;
        }

        /* Home quadrant fills */
        .q-red    { background: #e84040 !important; border-color: rgba(0,0,0,0.15) !important; }
        .q-green  { background: #2db85a !important; border-color: rgba(0,0,0,0.15) !important; }
        .q-yellow { background: #f0c020 !important; border-color: rgba(0,0,0,0.15) !important; }
        .q-blue   { background: #2888e0 !important; border-color: rgba(0,0,0,0.15) !important; }

        /* Home quadrant inner white yard */
        .yard-cell {
            background: #ffffff !important;
            border-radius: 6px;
        }

        /* Home stretch paths */
        .hs-red    { background: #f5a5a5 !important; }
        .hs-green  { background: #90dba8 !important; }
        .hs-yellow { background: #f5de80 !important; }
        .hs-blue   { background: #95c8f5 !important; }

        /* Track start arrow cells */
        .start-red    { background: #f5a5a5 !important; }
        .start-green  { background: #90dba8 !important; }
        .start-yellow { background: #f5de80 !important; }
        .start-blue   { background: #95c8f5 !important; }

        /* Center home triangles */
        .tri-red    { background: #e84040 !important; }
        .tri-green  { background: #2db85a !important; }
        .tri-yellow { background: #f0c020 !important; }
        .tri-blue   { background: #2888e0 !important; }
        .center     { background: #2d3548 !important; }

        /* Safe star spots */
        .safe::after {
            content: "★";
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(8px, 1.5vw, 13px);
            color: rgba(80,80,80,0.6);
            pointer-events: none;
        }

        /* Start arrows */
        .arrow-right::after  { content: "▶"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(7px, 1.2vw, 11px); color: rgba(0,0,0,0.35); pointer-events: none; }
        .arrow-left::after   { content: "◀"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(7px, 1.2vw, 11px); color: rgba(0,0,0,0.35); pointer-events: none; }
        .arrow-down::after   { content: "▼"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(7px, 1.2vw, 11px); color: rgba(0,0,0,0.35); pointer-events: none; }
        .arrow-up::after     { content: "▲"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(7px, 1.2vw, 11px); color: rgba(0,0,0,0.35); pointer-events: none; }

        /* ---- TOKEN LAYER ---- */
        #token-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        /* ---- PAWN / GOTI TOKENS ---- */
        .token {
            pointer-events: auto;
            position: absolute;
            width: 5.8%;
            height: 9%;
            transform: translate(-50%, -80%);
            cursor: pointer;
            touch-action: manipulation;
            transition: left 0.22s cubic-bezier(0.25, 0.46, 0.45, 1.3), top 0.22s cubic-bezier(0.25, 0.46, 0.45, 1.3);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5));
        }

        .token::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
        }

        /* Goti head (sphere) */
        .goti-head {
            width: 54%;
            height: 36%;
            border-radius: 50%;
            position: relative;
            z-index: 3;
            margin-bottom: -5%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), inset 2px 2px 4px rgba(255,255,255,0.45);
        }

        /* Goti neck */
        .goti-neck {
            width: 26%;
            height: 9%;
            border-radius: 40%;
            z-index: 2;
            margin-bottom: -3%;
        }

        /* Goti body (pear) */
        .goti-body {
            width: 84%;
            height: 58%;
            border-radius: 50% 50% 40% 40% / 80% 80% 28% 28%;
            z-index: 1;
            box-shadow: inset -2px -3px 5px rgba(0,0,0,0.25), inset 2px 2px 4px rgba(255,255,255,0.35);
        }

        /* Color variants */
        .token-red    .goti-head  { background: radial-gradient(circle at 35% 35%, #ff8c8c, #e84040 60%, #9b1c1c); }
        .token-red    .goti-neck  { background: #9b1c1c; }
        .token-red    .goti-body  { background: radial-gradient(circle at 38% 28%, #ff8c8c, #e84040 55%, #9b1c1c); }

        .token-green  .goti-head  { background: radial-gradient(circle at 35% 35%, #86efac, #2db85a 60%, #14532d); }
        .token-green  .goti-neck  { background: #14532d; }
        .token-green  .goti-body  { background: radial-gradient(circle at 38% 28%, #86efac, #2db85a 55%, #14532d); }

        .token-yellow .goti-head  { background: radial-gradient(circle at 35% 35%, #fef08a, #daa800 60%, #78450a); }
        .token-yellow .goti-neck  { background: #78450a; }
        .token-yellow .goti-body  { background: radial-gradient(circle at 38% 28%, #fef08a, #daa800 55%, #78450a); }

        .token-blue   .goti-head  { background: radial-gradient(circle at 35% 35%, #93c5fd, #2888e0 60%, #1e3a8a); }
        .token-blue   .goti-neck  { background: #1e3a8a; }
        .token-blue   .goti-body  { background: radial-gradient(circle at 38% 28%, #93c5fd, #2888e0 55%, #1e3a8a); }

        /* Movable pulse */
        .token.movable {
            animation: pulsePawn 1.1s infinite;
            z-index: 20;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        @keyframes pulsePawn {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)) drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
            50%       { filter: drop-shadow(0 0 9px rgba(255,255,255,1.0)) drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        }

        /* ---- TOAST ---- */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20,20,30,0.92);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.28s ease;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---- PLAYER CHIPS ROW ---- */
        #player-chips {
            width: 100%;
            max-width: 480px;
            display: flex;
            gap: 8px;
        }

        .player-chip {
            flex: 1;
            background: #252c3e;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            transition: border-color 0.2s;
        }

        .player-chip.active-turn {
            border-color: rgba(255,255,255,0.35);
            background: #2e3650;
        }

        .chip-name {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chip-dots {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }

        .chip-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            opacity: 0.35;
        }

        .chip-dot.at-home { opacity: 1; }
    </style>
</head>
<body>

    <div id="header">
        <div id="turn-row">
            <div id="turn-indicator">Connecting…</div>
            <div id="dice-badge">–</div>
        </div>
        <div id="dice-status">Waiting for game state</div>
    </div>

    <div id="board-wrapper">
        <div id="ludo-board"></div>
        <div id="token-layer"></div>
    </div>

    <div id="player-chips"></div>

    <div id="toast"></div>

    <script>
        // ---- URL PARAMS ----
        const urlParams = new URLSearchParams(window.location.search);
        const chatId   = parseInt(urlParams.get('chat_id'))  || 0;
        const userId   = parseInt(urlParams.get('user_id'))  || 0;
        const apiToken = urlParams.get('token') || "super_secret_ludo_token_123";
        const apiBase  = urlParams.get('api')   || window.location.origin;

        let gameState = null;
        const visualPositions = {};

        // ---- POSITION MATH ----
        function getPercentPos(r, c) {
            return { x: c * 6.6667 + 3.3333, y: r * 6.6667 + 3.3333 };
        }

        const trackCoords = [
            {r:6,c:1},{r:6,c:2},{r:6,c:3},{r:6,c:4},{r:6,c:5},
            {r:5,c:6},{r:4,c:6},{r:3,c:6},{r:2,c:6},{r:1,c:6},{r:0,c:6},
            {r:0,c:7},
            {r:0,c:8},{r:1,c:8},{r:2,c:8},{r:3,c:8},{r:4,c:8},{r:5,c:8},
            {r:6,c:9},{r:6,c:10},{r:6,c:11},{r:6,c:12},{r:6,c:13},{r:6,c:14},
            {r:7,c:14},
            {r:8,c:14},{r:8,c:13},{r:8,c:12},{r:8,c:11},{r:8,c:10},{r:8,c:9},
            {r:9,c:8},{r:10,c:8},{r:11,c:8},{r:12,c:8},{r:13,c:8},{r:14,c:8},
            {r:14,c:7},
            {r:14,c:6},{r:13,c:6},{r:12,c:6},{r:11,c:6},{r:10,c:6},{r:9,c:6},
            {r:8,c:5},{r:8,c:4},{r:8,c:3},{r:8,c:2},{r:8,c:1},{r:8,c:0},
            {r:7,c:0},
            {r:6,c:0}
        ];

        const baseCoords = {
            "🔴 Red":    [{r:2,c:2},{r:2,c:3},{r:3,c:2},{r:3,c:3}],
            "🟢 Green":  [{r:2,c:11},{r:2,c:12},{r:3,c:11},{r:3,c:12}],
            "🔵 Blue":   [{r:11,c:11},{r:11,c:12},{r:12,c:11},{r:12,c:12}],
            "🟡 Yellow": [{r:11,c:2},{r:11,c:3},{r:12,c:2},{r:12,c:3}]
        };

        function getSpecialPos(color, pos) {
            if (pos === 59) return {r:7,c:7};
            if (color === "🔴 Red")    return {r:7, c:pos-52};
            if (color === "🟢 Green")  return {r:pos-52, c:7};
            if (color === "🔵 Blue")   return {r:7, c:14-(pos-52)};
            if (color === "🟡 Yellow") return {r:14-(pos-52), c:7};
            return {r:7,c:7};
        }

        function resolvePosition(color, tokenIdx, pos) {
            let cell;
            if (pos === 0)       cell = baseCoords[color][tokenIdx];
            else if (pos >= 53)  cell = getSpecialPos(color, pos);
            else                 cell = trackCoords[(pos-1) % 52];
            return getPercentPos(cell.r, cell.c);
        }

        // ---- BUILD BOARD ----
        function createBoard() {
            const board = document.getElementById('ludo-board');
            board.innerHTML = '';

            // Pre-classify every cell
            const classes = Array.from({length:15}, ()=>Array(15).fill(''));

            // Quadrant backgrounds
            for (let r=0;r<6;r++) for (let c=0;c<6;c++)   classes[r][c] += ' q-red';
            for (let r=0;r<6;r++) for (let c=9;c<15;c++)  classes[r][c] += ' q-green';
            for (let r=9;r<15;r++) for (let c=0;c<6;c++)  classes[r][c] += ' q-yellow';
            for (let r=9;r<15;r++) for (let c=9;c<15;c++) classes[r][c] += ' q-blue';

            // Yard inner whites (rows/cols 1-4 within each quadrant)
            [[1,4,1,4],[1,4,10,13],[10,13,1,4],[10,13,10,13]].forEach(([r0,r1,c0,c1])=>{
                for (let r=r0;r<=r1;r++) for (let c=c0;c<=c1;c++) classes[r][c] += ' yard-cell';
            });

            // Home stretches
            for (let c=1;c<7;c++)  classes[7][c] += ' hs-red';
            for (let c=8;c<14;c++) classes[7][c] += ' hs-blue';
            for (let r=1;r<7;r++)  classes[r][7] += ' hs-green';
            for (let r=8;r<14;r++) classes[r][7] += ' hs-yellow';

            // Center triangles
            classes[6][7] += ' tri-green'; classes[7][6] += ' tri-red';
            classes[7][8] += ' tri-blue';  classes[8][7] += ' tri-yellow';
            classes[7][7] += ' center';

            // Start colored cells
            classes[6][1] += ' start-red';
            classes[1][8] += ' start-green';
            classes[8][13] += ' start-blue';
            classes[13][6] += ' start-yellow';

            // Safe spots (stars)
            const safeList = [[6,1],[8,1],[8,13],[6,13],[1,6],[1,8],[13,6],[13,8],[8,2],[2,6],[6,12],[12,8]];
            safeList.forEach(([r,c]) => classes[r][c] += ' safe');

            // Arrows for track entry
            classes[6][0] += ' arrow-right';
            classes[0][8] += ' arrow-down';
            classes[8][14] += ' arrow-left';
            classes[14][6] += ' arrow-up';

            for (let r=0;r<15;r++) {
                for (let c=0;c<15;c++) {
                    const div = document.createElement('div');
                    div.className = 'cell' + (classes[r][c] ? ' '+classes[r][c].trim() : '');
                    board.appendChild(div);
                }
            }
        }

        // ---- STEP ANIMATION ----
        function stepAnimateToken(key) {
            const vis = visualPositions[key];
            if (!vis) return;
            if (vis.pos < vis.target) {
                vis.pos++;
                renderTokens();
                setTimeout(() => stepAnimateToken(key), 230);
            } else {
                vis.animating = false;
                renderTokens();
            }
        }

        // ---- RENDER TOKENS ----
        function renderTokens() {
            if (!gameState) return;
            const layer = document.getElementById('token-layer');
            layer.innerHTML = '';
            const posMap = {};

            Object.keys(visualPositions).forEach(key => {
                const vis = visualPositions[key];
                const player = vis.player;
                const pidx = gameState.players.findIndex(p => p.id === player.id);
                if (pidx === -1) return;
                const colorCode = player.color.includes('Red') ? 'red' :
                                  player.color.includes('Green') ? 'green' :
                                  player.color.includes('Blue') ? 'blue' : 'yellow';
                const absPos = resolvePosition(player.color, vis.tidx, vis.pos);
                const coordKey = `${Math.round(absPos.x*10)}_${Math.round(absPos.y*10)}`;
                if (!posMap[coordKey]) posMap[coordKey] = [];
                posMap[coordKey].push({ key, vis, pidx, colorCode, player, absPos });
            });

            Object.values(posMap).forEach(stacked => {
                stacked.forEach((info, idx) => {
                    const token = document.createElement('div');
                    token.className = `token token-${info.colorCode}`;

                    const head = document.createElement('div');
                    head.className = 'pin-head';
                    const dot = document.createElement('div');
                    dot.className = 'pin-dot';
                    head.appendChild(dot);
                    token.appendChild(head);

                    const offsetX = stacked.length > 1 ? (idx * 1.8) - (stacked.length-1)*0.9 : 0;
                    const offsetY = stacked.length > 1 ? (idx * -1.6) : 0;
                    token.style.left = `${info.absPos.x + offsetX}%`;
                    token.style.top  = `${info.absPos.y + offsetY}%`;

                    const isMyTurn = gameState.turn_index === info.pidx && info.player.id === userId;
                    const canMove  = isMyTurn && gameState.rolled && canMoveRule(info.vis.pos, gameState.dice_value) && !info.vis.animating;

                    if (canMove) {
                        token.classList.add('movable');
                        token.addEventListener('pointerdown', e => {
                            e.stopPropagation(); e.preventDefault();
                            performMove(info.vis.tidx);
                        });
                    }

                    layer.appendChild(token);
                });
            });
        }

        // ---- PLAYER CHIPS ----
        function updatePlayerChips() {
            if (!gameState) return;
            const container = document.getElementById('player-chips');
            container.innerHTML = '';
            gameState.players.forEach((p, pidx) => {
                const chip = document.createElement('div');
                chip.className = 'player-chip' + (gameState.turn_index === pidx ? ' active-turn' : '');

                const colorHex = getColorHex(p.color);
                const colorCode = p.color.includes('Red') ? 'red' :
                                  p.color.includes('Green') ? 'green' :
                                  p.color.includes('Blue') ? 'blue' : 'yellow';

                const name = document.createElement('div');
                name.className = 'chip-name';
                name.style.color = colorHex;
                name.textContent = p.username || p.color.split(' ')[1];

                const dots = document.createElement('div');
                dots.className = 'chip-dots';
                (p.tokens || [0,0,0,0]).forEach(pos => {
                    const d = document.createElement('div');
                    d.className = 'chip-dot' + (pos === 59 ? ' at-home' : pos > 0 ? ' at-home' : '');
                    d.style.background = colorHex;
                    dots.appendChild(d);
                });

                chip.appendChild(name);
                chip.appendChild(dots);
                container.appendChild(chip);
            });
        }

        // ---- UPDATE UI ----
        function updateUI() {
            if (!gameState) return;
            const cur = gameState.players[gameState.turn_index];
            const indicator = document.getElementById('turn-indicator');
            const badge     = document.getElementById('dice-badge');
            const status    = document.getElementById('dice-status');

            if (gameState.winner !== -1) {
                const wName = gameState.players[gameState.winner].username;
                indicator.innerHTML = `Winner: ${wName}!`;
                badge.textContent = '🏆';
                status.textContent = 'Game over';
            } else {
                indicator.innerHTML = `<span style="color:${getColorHex(cur.color)}">${cur.username || cur.color.split(' ')[1]}</span>'s turn`;
                badge.textContent = gameState.rolled ? `🎲 ${gameState.dice_value}` : `–`;
                status.textContent = gameState.rolled ? 'Tap a highlighted token to move' : 'Awaiting roll in Telegram chat';
            }

            updatePlayerChips();

            gameState.players.forEach(player => {
                player.tokens.forEach((serverPos, tidx) => {
                    const key = `${player.color}_${tidx}`;
                    if (visualPositions[key] === undefined) {
                        visualPositions[key] = { pos: serverPos, target: serverPos, animating: false, player, tidx };
                    } else {
                        visualPositions[key].player = player;
                    }
                    const vis = visualPositions[key];
                    if (serverPos < vis.pos || serverPos === 0) {
                        vis.pos = serverPos; vis.target = serverPos; vis.animating = false;
                    } else if (serverPos > vis.target) {
                        vis.target = serverPos;
                        if (!vis.animating) { vis.animating = true; stepAnimateToken(key); }
                    }
                });
            });

            renderTokens();
        }

        function getColorHex(c) {
            if (c.includes('Red'))    return '#f56565';
            if (c.includes('Green'))  return '#48bb78';
            if (c.includes('Blue'))   return '#4299e1';
            if (c.includes('Yellow')) return '#ecc94b';
            return '#ffffff';
        }

        function canMoveRule(pos, dice) {
            if (pos >= 59) return false;
            if (pos === 0) return true;
            let np = pos + dice;
            if (pos <= 52 && np > 52) np = 52 + (np - 52);
            if (np > 58) np = 59; // clamp at finish
            return np !== pos;
        }

        // ---- API CALLS ----
        async function fetchGameState() {
            try {
                const res = await fetch(`${apiBase}/game_state?chat_id=${chatId}&token=${apiToken}`);
                if (res.ok) { gameState = await res.json(); updateUI(); }
                else { const e = await res.json(); console.error(e.error); }
            } catch (err) { console.error('fetchGameState:', err); }
        }

        async function performMove(tokenIdx) {
            showToast('Moving token…');
            try {
                const res = await fetch(`${apiBase}/move?chat_id=${chatId}&user_id=${userId}&token_idx=${tokenIdx}&token=${apiToken}`, { method: 'POST' });
                const d = await res.json();
                if (res.ok) { showToast('Move done!'); fetchGameState(); }
                else showToast(`⚠️ ${d.error || 'Move rejected'}`);
            } catch (err) { showToast('⚠️ Network error'); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2400);
        }

        // ---- BOOT ----
        createBoard();
        fetchGameState();
        setInterval(fetchGameState, 2000);
    </script>
</body>
