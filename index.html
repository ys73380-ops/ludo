<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Ludo Companion</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #121824, #1a2333);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #game-header {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        #turn-indicator {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #dice-status {
            font-size: 0.9rem;
            color: #a0aec0;
        }

        #board-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 4px solid #1a2333;
        }

        #ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%;
            height: 100%;
        }

        .cell {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .red-bg { background-color: #f56565 !important; }
        .green-bg { background-color: #48bb78 !important; }
        .yellow-bg { background-color: #ecc94b !important; }
        .blue-bg { background-color: #4299e1 !important; }

        .red-start { background-color: #fc8181 !important; border-radius: 5px; }
        .green-start { background-color: #68d391 !important; border-radius: 5px; }
        .blue-start { background-color: #63b3ed !important; border-radius: 5px; }
        .yellow-start { background-color: #f6e05e !important; border-radius: 5px; }

        .safe-spot::before {
            content: "★";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #718096;
            font-size: 1.2rem;
        }

        .center-core { background: #2d3748 !important; }
        .red-home-stretch { background: #feb2b2 !important; }
        .green-home-stretch { background: #9ae6b4 !important; }
        .blue-home-stretch { background: #90cdf4 !important; }
        .yellow-home-stretch { background: #faf089 !important; }

        .token-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .token {
            pointer-events: auto;
            width: 6.0%;
            height: 9.0%;
            position: absolute;
            transform: translate(-50%, -75%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
            touch-action: manipulation;
            transition: left 0.22s cubic-bezier(0.25, 0.46, 0.45, 1.3), top 0.22s cubic-bezier(0.25, 0.46, 0.45, 1.3);
            z-index: 10;
        }

        .token::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
        }

        .token-red {
            --goti-color-light: #ff8787;
            --goti-color-main: #e53e3e;
            --goti-color-dark: #9b2c2c;
        }
        .token-green {
            --goti-color-light: #86efac;
            --goti-color-main: #38a169;
            --goti-color-dark: #14532d;
        }
        .token-yellow {
            --goti-color-light: #fef08a;
            --goti-color-main: #ecc94b;
            --goti-color-dark: #a16207;
        }
        .token-blue {
            --goti-color-light: #93c5fd;
            --goti-color-main: #3182ce;
            --goti-color-dark: #1e3a8a;
        }

        .goti-head {
            width: 52%;
            height: 38%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--goti-color-light), var(--goti-color-main) 65%, var(--goti-color-dark));
            box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.5), 0 2px 3px rgba(0, 0, 0, 0.25);
            z-index: 3;
            margin-bottom: -4%;
        }

        .goti-neck {
            width: 28%;
            height: 10%;
            background: var(--goti-color-dark);
            border-radius: 50%;
            z-index: 2;
            margin-bottom: -4%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        .goti-body {
            width: 82%;
            height: 56%;
            background: radial-gradient(circle at 40% 25%, var(--goti-color-light) 0%, var(--goti-color-main) 50%, var(--goti-color-dark) 100%);
            border-radius: 50% 50% 42% 42% / 85% 85% 25% 25%;
            box-shadow: inset 1px 2px 3px rgba(255,255,255,0.4), 0 3px 5px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .token.movable {
            animation: pulseHighlightPawn 1.2s infinite;
            z-index: 20;
            transform: translate(-50%, -75%) scale(1.15);
        }

        @keyframes pulseHighlightPawn {
            0% { filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0)) drop-shadow(0 4px 5px rgba(0,0,0,0.4)); }
            50% { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 1)) drop-shadow(0 4px 5px rgba(0,0,0,0.4)); }
            100% { filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0)) drop-shadow(0 4px 5px rgba(0,0,0,0.4)); }
        }

        #toast {
            position: fixed;
            bottom: 30px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="game-header">
            <div id="turn-indicator">Loading game session...</div>
            <div id="dice-status">Waiting for network sync</div>
        </div>

        <div id="board-wrapper">
            <div id="ludo-board"></div>
            <div id="token-layer" class="token-layer"></div>
        </div>
    </div>

    <div id="toast">Message</div>

    <script>
        // ============================================================
        // 1. PARSE URL PARAMETERS
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = parseInt(urlParams.get('chat_id')) || 0;
        const userId = parseInt(urlParams.get('user_id')) || 0;
        const sessionToken = urlParams.get('token') || "";
        const apiBase = urlParams.get('api') || window.location.origin;

        // Master API Token: try from URL param, else use hardcoded fallback.
        const MASTER_API_TOKEN = urlParams.get('api_token') || "super_secret_ludo_token_123";

        console.log("🔑 Master API Token:", MASTER_API_TOKEN);
        console.log("🎮 Chat ID:", chatId, "User ID:", userId);
        console.log("🔐 Session Token:", sessionToken);
        console.log("🌐 API Base:", apiBase);

        let gameState = null;
        const visualPositions = {};

        // ============================================================
        // 2. BOARD COORDINATE HELPERS
        // ============================================================
        function getPercentPos(r, c) {
            return {
                x: (c * 6.666) + 3.333,
                y: (r * 6.666) + 3.333
            };
        }

        const trackCoords = [
            {r:6, c:1}, {r:6, c:2}, {r:6, c:3}, {r:6, c:4}, {r:6, c:5},
            {r:5, c:6}, {r:4, c:6}, {r:3, c:6}, {r:2, c:6}, {r:1, c:6}, {r:0, c:6},
            {r:0, c:7},
            {r:0, c:8}, {r:1, c:8}, {r:2, c:8}, {r:3, c:8}, {r:4, c:8}, {r:5, c:8},
            {r:6, c:9}, {r:6, c:10}, {r:6, c:11}, {r:6, c:12}, {r:6, c:13}, {r:6, c:14},
            {r:7, c:14},
            {r:8, c:14}, {r:8, c:13}, {r:8, c:12}, {r:8, c:11}, {r:8, c:10}, {r:8, c:9},
            {r:9, c:8}, {r:10, c:8}, {r:11, c:8}, {r:12, c:8}, {r:13, c:8}, {r:14, c:8},
            {r:14, c:7},
            {r:14, c:6}, {r:13, c:6}, {r:12, c:6}, {r:11, c:6}, {r:10, c:6}, {r:9, c:6},
            {r:8, c:5}, {r:8, c:4}, {r:8, c:3}, {r:8, c:2}, {r:8, c:1}, {r:8, c:0},
            {r:7, c:0},
            {r:6, c:0}
        ];

        const baseCoords = {
            "🔴 Red":    [{r:2, c:2}, {r:2, c:3}, {r:3, c:2}, {r:3, c:3}],
            "🟢 Green":  [{r:2, c:11}, {r:2, c:12}, {r:3, c:11}, {r:3, c:12}],
            "🔵 Blue":   [{r:11, c:11}, {r:11, c:12}, {r:12, c:11}, {r:12, c:12}],
            "🟡 Yellow": [{r:11, c:2}, {r:11, c:3}, {r:12, c:2}, {r:12, c:3}]
        };

        function getSpecialPos(color, pos) {
            if (pos === 59) return {r:7, c:7};
            if (color === "🔴 Red") return {r:7, c: pos - 52};
            if (color === "🟢 Green") return {r: pos - 52, c:7};
            if (color === "🔵 Blue") return {r:7, c: 14 - (pos - 52)};
            if (color === "🟡 Yellow") return {r: 14 - (pos - 52), c:7};
            return {r:7, c:7};
        }

        function resolvePosition(color, tokenIdx, pos) {
            let cell = {r:0, c:0};
            if (pos === 0) {
                cell = baseCoords[color][tokenIdx];
            } else if (pos >= 53) {
                cell = getSpecialPos(color, pos);
            } else {
                let trackIdx = (pos - 1) % 52;
                cell = trackCoords[trackIdx];
            }
            return getPercentPos(cell.r, cell.c);
        }

        // ============================================================
        // 3. BOARD RENDERING
        // ============================================================
        function createBoard() {
            const board = document.getElementById('ludo-board');
            board.innerHTML = '';
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (r < 6 && c < 6) cell.classList.add('red-bg');
                    else if (r < 6 && c > 8) cell.classList.add('green-bg');
                    else if (r > 8 && c < 6) cell.classList.add('yellow-bg');
                    else if (r > 8 && c > 8) cell.classList.add('blue-bg');
                    else if (r === 7 && c > 0 && c < 7) cell.classList.add('red-bg');
                    else if (r === 7 && c > 7 && c < 14) cell.classList.add('blue-bg');
                    else if (c === 7 && r > 0 && r < 7) cell.classList.add('green-bg');
                    else if (c === 7 && r > 7 && r < 14) cell.classList.add('yellow-bg');
                    else if (r === 6 && c === 1) cell.classList.add('red-start');
                    else if (r === 1 && c === 8) cell.classList.add('green-start');
                    else if (r === 8 && c === 13) cell.classList.add('blue-start');
                    else if (r === 13 && c === 6) cell.classList.add('yellow-start');
                    else if (r >= 6 && r <= 8 && c >= 6 && c <= 8) {
                        if (r === 7 && c === 7) cell.classList.add('center-core');
                        else if (r < 7) cell.classList.add('green-home-stretch');
                        else if (r > 7) cell.classList.add('yellow-home-stretch');
                        else if (c < 7) cell.classList.add('red-home-stretch');
                        else if (c > 7) cell.classList.add('blue-home-stretch');
                    }
                    
                    if ((r === 6 && c === 1) || (r === 8 && c === 1) || (r === 8 && c === 13) || (r === 6 && c === 13) ||
                        (r === 1 && c === 6) || (r === 1 && c === 8) || (r === 13 && c === 6) || (r === 13 && c === 8) ||
                        (r === 8 && c === 2) || (r === 2 && c === 6) || (r === 6 && c === 12) || (r === 12 && c === 8)) {
                        cell.classList.add('safe-spot');
                    }
                    
                    board.appendChild(cell);
                }
            }
        }

        // ============================================================
        // 4. TOKEN ANIMATION & RENDERING
        // ============================================================
        function stepAnimateToken(key) {
            const vis = visualPositions[key];
            if (!vis) return;

            if (vis.pos < vis.target) {
                vis.pos++;
                renderTokens();
                setTimeout(() => {
                    stepAnimateToken(key);
                }, 240);
            } else {
                vis.animating = false;
                renderTokens();
            }
        }

        function renderTokens() {
            if (!gameState) return;
            const layer = document.getElementById('token-layer');
            layer.innerHTML = '';

            const positionTracker = {};

            Object.keys(visualPositions).forEach(key => {
                const vis = visualPositions[key];
                const player = vis.player;
                const pidx = gameState.players.findIndex(p => p.id === player.id);
                if (pidx === -1) return;

                const colorCode = player.color.split(' ')[1].toLowerCase();
                const absPos = resolvePosition(player.color, vis.tidx, vis.pos);
                
                const coordKey = `${Math.round(absPos.x)}_${Math.round(absPos.y)}`;
                if (!positionTracker[coordKey]) {
                    positionTracker[coordKey] = [];
                }
                positionTracker[coordKey].push({ key, vis, pidx, colorCode, player, absPos });
            });

            Object.keys(positionTracker).forEach(coordKey => {
                const stacked = positionTracker[coordKey];
                stacked.forEach((info, index) => {
                    const token = document.createElement('div');
                    token.className = `token token-${info.colorCode}`;
                    
                    const head = document.createElement('div');
                    head.className = 'goti-head';
                    const neck = document.createElement('div');
                    neck.className = 'goti-neck';
                    const body = document.createElement('div');
                    body.className = 'goti-body';

                    token.appendChild(head);
                    token.appendChild(neck);
                    token.appendChild(body);

                    let offsetPercentX = 0;
                    let offsetPercentY = 0;
                    if (stacked.length > 1) {
                        offsetPercentX = (index * 1.6) - (stacked.length - 1) * 0.8;
                        offsetPercentY = (index * -1.6) + (stacked.length - 1) * 0.8;
                    }

                    token.style.left = `${info.absPos.x + offsetPercentX}%`;
                    token.style.top = `${info.absPos.y + offsetPercentY}%`;

                    const isMyTurn = (gameState.turn_index === info.pidx) && (info.player.id === userId);
                    const canMoveThisToken = isMyTurn && gameState.rolled && canMoveRule(info.vis.pos, gameState.dice_value) && !info.vis.animating;

                    if (canMoveThisToken) {
                        token.classList.add('movable');
                        token.addEventListener('pointerdown', (e) => {
                            e.stopPropagation();
                            e.preventDefault();
                            performMove(info.vis.tidx);
                        });
                    }

                    layer.appendChild(token);
                });
            });
        }

        function updateUI() {
            if (!gameState) return;

            const currentTurnIdx = gameState.turn_index;
            const currentPlayer = gameState.players[currentTurnIdx];
            const turnIndicator = document.getElementById('turn-indicator');
            const diceStatus = document.getElementById('dice-status');

            if (gameState.winner !== -1) {
                const winnerName = gameState.players[gameState.winner].username;
                turnIndicator.innerHTML = `🏆 Winner: ${winnerName}!`;
                diceStatus.innerHTML = `The game has finished.`;
                return;
            }

            turnIndicator.innerHTML = `👉 Turn: <span style="color: ${getColorHex(currentPlayer.color)}">${currentPlayer.username}</span>`;
            
            if (gameState.rolled) {
                diceStatus.innerHTML = `🎲 Dice Rolled = <b>${gameState.dice_value}</b> | Please tap a movable token!`;
            } else {
                diceStatus.innerHTML = `⏳ Awaiting word submission/roll in Telegram chat.`;
            }

            gameState.players.forEach((player) => {
                player.tokens.forEach((serverPos, tidx) => {
                    const key = `${player.color}_${tidx}`;
                    
                    if (visualPositions[key] === undefined) {
                        visualPositions[key] = {
                            pos: serverPos,
                            target: serverPos,
                            animating: false,
                            player: player,
                            tidx: tidx
                        };
                    } else {
                        visualPositions[key].player = player;
                    }

                    const vis = visualPositions[key];

                    if (serverPos < vis.pos || serverPos === 0) {
                        vis.pos = serverPos;
                        vis.target = serverPos;
                        vis.animating = false;
                    } else if (serverPos > vis.target) {
                        vis.target = serverPos;
                        if (!vis.animating) {
                            vis.animating = true;
                            stepAnimateToken(key);
                        }
                    }
                });
            });

            renderTokens();
        }

        function getColorHex(colorStr) {
            if (colorStr.includes("Red")) return "#f56565";
            if (colorStr.includes("Green")) return "#48bb78";
            if (colorStr.includes("Blue")) return "#4299e1";
            if (colorStr.includes("Yellow")) return "#ecc94b";
            return "#ffffff";
        }

        function canMoveRule(pos, dice) {
            if (pos >= 59) return false;
            if (pos === 0) return true;
            let newPos = pos + dice;
            if (1 <= pos && pos <= 52 && newPos > 52) {
                newPos = 52 + (newPos - 52);
            }
            if (newPos > 58) newPos = 59;
            return newPos !== pos;
        }

        // ============================================================
        // 5. API INTERACTION (FIXED)
        // ============================================================
        async function fetchGameState() {
            try {
                const url = `${apiBase}/game_state?chat_id=${chatId}&api_token=${MASTER_API_TOKEN}&token=${sessionToken}`;
                console.log("📡 Fetching game state:", url);
                
                const response = await fetch(url);
                if (response.ok) {
                    gameState = await response.json();
                    updateUI();
                } else {
                    const errData = await response.json();
                    console.error("Error fetching state:", errData);
                    showToast(`⚠️ ${errData.error || "Failed to load game"}`);
                }
            } catch (err) {
                console.error("Network error during fetchGameState:", err);
                showToast("⚠️ Network error connecting to server");
            }
        }

        async function performMove(tokenIdx) {
            showToast("Processing token movement...");
            try {
                const url = `${apiBase}/move?chat_id=${chatId}&user_id=${userId}&token_idx=${tokenIdx}&api_token=${MASTER_API_TOKEN}&token=${sessionToken}`;
                console.log("📡 Executing move:", url);
                
                const response = await fetch(url, {
                    method: 'POST'
                });
                const resData = await response.json();
                
                if (response.ok) {
                    showToast("✅ Move executed successfully!");
                    fetchGameState();
                } else {
                    showToast(`⚠️ ${resData.error || "Movement rejected"}`);
                }
            } catch (err) {
                showToast("⚠️ Network issue executing turn.");
                console.error("Network error during performMove:", err);
            }
        }

        // ============================================================
        // 6. TOAST HELPER
        // ============================================================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // ============================================================
        // 7. INIT
        // ============================================================
        createBoard();
        
        if (!chatId) {
            showToast("⚠️ Missing chat_id parameter!");
            document.getElementById('turn-indicator').textContent = "❌ Invalid Game Link";
            document.getElementById('dice-status').textContent = "Please use the link from the bot.";
        } else if (!userId) {
            showToast("⚠️ Missing user_id parameter!");
            document.getElementById('turn-indicator').textContent = "❌ Invalid User";
            document.getElementById('dice-status').textContent = "Please use the link from the bot.";
        } else {
            fetchGameState();
            setInterval(fetchGameState, 2000);
        }
    </script>
</body>
</html>
